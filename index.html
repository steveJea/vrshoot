<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIOLENCE ROYALE - SHOOTING MASTERS</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
  body {
    background: #0a0a0a;
    color: #fff;
    font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
    overflow: hidden;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .screen {
    display: none;
    width: 100%;
    max-width: 960px;
    height: 100vh;
    max-height: 720px;
    position: relative;
    background: #111;
    border: 2px solid #333;
  }
  .screen.active { display: flex; flex-direction: column; }

  #title-screen {
    justify-content: center;
    align-items: center;
    text-align: center;
    background: linear-gradient(180deg, #1a0000 0%, #000 100%);
  }
  #title-screen h1 {
    font-size: 3.2rem;
    letter-spacing: 6px;
    color: #ff2222;
    text-shadow: 0 0 20px #ff0000, 0 0 40px #aa0000;
    margin-bottom: 8px;
  }
  #title-screen .sub {
    font-size: 1.4rem;
    color: #aaa;
    letter-spacing: 4px;
    margin-bottom: 40px;
  }
  #title-screen .game-title {
    font-size: 1.8rem;
    color: #fff;
    margin-bottom: 60px;
  }
  #title-screen .start-msg {
    font-size: 1.1rem;
    color: #ff6666;
    animation: blink 1.2s infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  #select-screen {
    background: #151515;
    padding: 20px;
  }
  #select-screen h2 {
    text-align: center;
    font-size: 1.8rem;
    margin-bottom: 20px;
    color: #ff4444;
    letter-spacing: 3px;
  }
  .char-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 12px;
    flex: 1;
  }
  .char-card {
    background: #222;
    border: 3px solid #444;
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .char-card:hover {
    border-color: #ff4444;
    transform: scale(1.05);
    box-shadow: 0 0 15px rgba(255,50,50,0.6);
  }
  .char-card.selected {
    border-color: #ffcc00;
    box-shadow: 0 0 20px #ffcc00;
    animation: selectPulse 0.6s;
  }
  .char-card img {
    width: 100%;
    height: 140px;
    object-fit: cover;
    display: block;
  }
  .char-card .name {
    text-align: center;
    padding: 6px 0;
    font-size: 0.85rem;
    background: #1a1a1a;
  }
  @keyframes selectPulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.12); }
    100% { transform: scale(1.05); }
  }

  #vs-screen {
    justify-content: center;
    align-items: center;
    background: #0d0d0d;
  }
  .vs-container {
    display: flex;
    align-items: center;
    gap: 60px;
  }
  .vs-char {
    text-align: center;
  }
  .vs-char img {
    width: 220px;
    height: 280px;
    object-fit: contain;
  }
  .vs-char .name {
    margin-top: 15px;
    font-size: 1.4rem;
    letter-spacing: 2px;
  }
  .vs-text {
    font-size: 3.5rem;
    font-weight: bold;
    color: #ff3333;
    text-shadow: 0 0 30px #ff0000;
  }

  #battle-screen {
    background: #0a0a12;
    flex-direction: column;
  }
  #battle-ui {
    display: flex;
    justify-content: space-between;
    padding: 10px 20px;
    background: #111;
    border-bottom: 2px solid #333;
    align-items: center;
  }
  .hp-box {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 280px;
  }
  .hp-box img {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 2px solid #555;
    object-fit: cover;
  }
  .hp-bar-wrap {
    flex: 1;
    height: 18px;
    background: #333;
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }
  .hp-bar {
    height: 100%;
    background: linear-gradient(90deg, #ffcc00, #ffaa00);
    transition: width 0.15s;
  }
  .timer {
    font-size: 2.2rem;
    font-weight: bold;
    color: #fff;
    min-width: 80px;
    text-align: center;
    text-shadow: 0 0 10px #ff4444;
  }
  #battle-canvas {
    flex: 1;
    width: 100%;
    background: linear-gradient(180deg, #1a1025 0%, #0a0a15 50%, #151020 100%);
    display: block;
  }
  .battle-info {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.85rem;
    color: #888;
  }

  .result-screen {
    justify-content: center;
    align-items: center;
    background: #0d0d0d;
    text-align: center;
  }
  .result-title {
    font-size: 3rem;
    margin-bottom: 30px;
    letter-spacing: 4px;
  }
  .result-title.win { color: #ffcc00; text-shadow: 0 0 20px #ffaa00; }
  .result-title.lose { color: #ff3333; text-shadow: 0 0 20px #ff0000; }
  .result-faces {
    display: flex;
    gap: 40px;
    margin-bottom: 30px;
    justify-content: center;
  }
  .result-faces img {
    width: 180px;
    height: 180px;
    border-radius: 12px;
    object-fit: cover;
    border: 3px solid #444;
  }
  .win-txt {
    font-size: 1.3rem;
    color: #ddd;
    max-width: 500px;
    line-height: 1.5;
    padding: 15px 25px;
    background: rgba(255,255,255,0.05);
    border-radius: 8px;
  }

  #gameover-screen {
    justify-content: center;
    align-items: center;
    background: #000;
  }
  #gameover-screen h1 {
    font-size: 4rem;
    color: #ff2222;
    letter-spacing: 8px;
    text-shadow: 0 0 30px #ff0000;
  }
</style>
</head>
<body>

<div id="title-screen" class="screen active">
  <h1>VIOLENCE ROYALE</h1>
  <div class="sub">THE BRUTAL CITY</div>
  <div class="game-title">SHOOTING MASTERS</div>
  <div class="start-msg">Press Any Key to START</div>
</div>

<div id="select-screen" class="screen">
  <h2>Select Your Fighter</h2>
  <div class="char-grid" id="char-grid"></div>
</div>

<div id="vs-screen" class="screen">
  <div class="vs-container">
    <div class="vs-char">
      <img id="vs-player-img" src="" alt="">
      <div class="name" id="vs-player-name"></div>
    </div>
    <div class="vs-text">VS</div>
    <div class="vs-char">
      <img id="vs-enemy-img" src="" alt="">
      <div class="name" id="vs-enemy-name"></div>
    </div>
  </div>
</div>

<div id="battle-screen" class="screen">
  <div id="battle-ui">
    <div class="hp-box">
      <img id="player-face" src="" alt="">
      <div class="hp-bar-wrap">
        <div class="hp-bar" id="player-hp-bar"></div>
      </div>
    </div>
    <div class="timer" id="timer">100</div>
    <div class="hp-box" style="flex-direction: row-reverse;">
      <img id="enemy-face" src="" alt="">
      <div class="hp-bar-wrap">
        <div class="hp-bar" id="enemy-hp-bar"></div>
      </div>
    </div>
  </div>
  <canvas id="battle-canvas"></canvas>
  <div class="battle-info">← → 이동 | 자동공격 | Q : 특수공격 (1회)</div>
</div>

<div id="victory-screen" class="screen result-screen">
  <div class="result-title win">YOU WIN</div>
  <div class="result-faces">
    <img id="vic-player" src="" alt="">
    <img id="vic-enemy" src="" alt="">
  </div>
  <div class="win-txt" id="vic-txt"></div>
</div>

<div id="fail-screen" class="screen result-screen">
  <div class="result-title lose">YOU LOSE</div>
  <div class="result-faces">
    <img id="fail-player" src="" alt="">
    <img id="fail-enemy" src="" alt="">
  </div>
  <div class="win-txt" id="fail-txt"></div>
</div>

<div id="gameover-screen" class="screen">
  <h1>GAME OVER</h1>
</div>

<script>
const RAW = "https://raw.githubusercontent.com/steveJea/vrshoot/main/img/";
const characters = [
  {id:10001, name:"YURI",    Pwr:100, Eng:100, spd:100, type:1001, bomb:"dark",  face_a:RAW+"10001_fa.png", face_n:RAW+"10001_fn.png", SD_full:RAW+"10001_full.png", pf_img:RAW+"10001_pf.jpg", win_txt:"Death to the ugly and lowly!"},
  {id:10002, name:"SEKANG",  Pwr:150, Eng:120, spd:30,  type:1002, bomb:"fire",  face_a:RAW+"10002_fa.png", face_n:RAW+"10002_fn.png", SD_full:RAW+"10002_full.png", pf_img:RAW+"10002_pf.jpg", win_txt:"Don't block my path!"},
  {id:10003, name:"HOO",     Pwr:110, Eng:80,  spd:110, type:1003, bomb:"ice",   face_a:RAW+"10003_fa.png", face_n:RAW+"10003_fn.png", SD_full:RAW+"10003_full.png", pf_img:RAW+"10003_pf.jpg", win_txt:"You're going to really die if you keep doing that."},
  {id:10004, name:"SAEM",    Pwr:60,  Eng:100, spd:140, type:1001, bomb:"ice",   face_a:RAW+"10004_fa.png", face_n:RAW+"10004_fn.png", SD_full:RAW+"10004_full.png", pf_img:RAW+"10004_pf.jpg", win_txt:"Oh my, you're really ugly."},
  {id:10005, name:"H.K.",    Pwr:80,  Eng:80,  spd:140, type:1002, bomb:"dark",  face_a:RAW+"10005_fa.png", face_n:RAW+"10005_fn.png", SD_full:RAW+"10005_full.png", pf_img:RAW+"10005_pf.jpg", win_txt:"Hehe, want to play with me more?"},
  {id:10006, name:"NAHYOEN", Pwr:90,  Eng:80,  spd:130, type:1003, bomb:"dark",  face_a:RAW+"10006_fa.png", face_n:RAW+"10006_fn.png", SD_full:RAW+"10006_full.png", pf_img:RAW+"10006_pf.jpg", win_txt:"It's such a waste of time wasted on someone like you."},
  {id:10007, name:"JOONNKI", Pwr:90,  Eng:100, spd:110, type:1001, bomb:"wind",  face_a:RAW+"10007_fa.png", face_n:RAW+"10007_fn.png", SD_full:RAW+"10007_full.png", pf_img:RAW+"10007_pf.jpg", win_txt:"Hey... I really did win, right?"},
  {id:10008, name:"SEONGHO", Pwr:120, Eng:100, spd:80,  type:1002, bomb:"dark",  face_a:RAW+"10008_fa.png", face_n:RAW+"10008_fn.png", SD_full:RAW+"10008_full.png", pf_img:RAW+"10008_pf.jpg", win_txt:"Receive the grace of the gods."},
  {id:10009, name:"JINSEONG",Pwr:100, Eng:110, spd:90,  type:1003, bomb:"fire",  face_a:RAW+"10009_fa.png", face_n:RAW+"10009_fn.png", SD_full:RAW+"10009_full.png", pf_img:RAW+"10009_pf.jpg", win_txt:"Where should I cut you, first?"},
  {id:10010, name:"JUNCHEOL",Pwr:80,  Eng:70,  spd:150, type:1001, bomb:"fire",  face_a:RAW+"10010_fa.png", face_n:RAW+"10010_fn.png", SD_full:RAW+"10010_full.png", pf_img:RAW+"10010_pf.jpg", win_txt:"Don't mess with me!"},
  {id:10011, name:"HYERI",   Pwr:80,  Eng:120, spd:100, type:1002, bomb:"light", face_a:RAW+"10011_fa.png", face_n:RAW+"10011_fn.png", SD_full:RAW+"10011_full.png", pf_img:RAW+"10011_pf.jpg", win_txt:"Does it hurt a lot? I'm sorry."},
  {id:10012, name:"MINSEOP", Pwr:90,  Eng:100, spd:110, type:1003, bomb:"wind",  face_a:RAW+"10012_fa.png", face_n:RAW+"10012_fn.png", SD_full:RAW+"10012_full.png", pf_img:RAW+"10012_pf.jpg", win_txt:"From now on, you are my slave."}
];

characters.forEach(c => {
  c.img_n = new Image();
  c.img_n.src = c.face_n;
  c.img_a = new Image();
  c.img_a.src = c.face_a;
});

let defeated = new Set();
let playerChar = null;
let enemyChar = null;
let gameState = "title";

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  gameState = id.replace('-screen','');
}

document.addEventListener('keydown', function(e) {
  if (gameState === 'title') {
    showScreen('select-screen');
    renderSelect();
  }
});

function renderSelect() {
  const grid = document.getElementById('char-grid');
  grid.innerHTML = '';
  characters.forEach(c => {
    const card = document.createElement('div');
    card.className = 'char-card';
    card.innerHTML = '<img src="' + c.pf_img + '" alt="' + c.name + '"><div class="name">' + c.name + '</div>';
    card.onclick = function() { selectPlayer(c, card); };
    grid.appendChild(card);
  });
}

function selectPlayer(c, card) {
  playerChar = c;
  card.classList.add('selected');
  const candidates = characters.filter(function(x) { return x.id !== c.id; });
  enemyChar = candidates[Math.floor(Math.random() * candidates.length)];
  setTimeout(function() { goToVS(); }, 700);
}

function goToVS() {
  document.getElementById('vs-player-img').src = playerChar.SD_full;
  document.getElementById('vs-player-name').textContent = playerChar.name;
  document.getElementById('vs-enemy-img').src = enemyChar.SD_full;
  document.getElementById('vs-enemy-name').textContent = enemyChar.name;
  showScreen('vs-screen');
  setTimeout(function() { startBattle(); }, 2000);
}

const canvas = document.getElementById('battle-canvas');
const ctx = canvas.getContext('2d');
let W, H, midY;
let player, enemy;
let bullets = [];
let effects = [];
let keys = {};
let timer = 100;
let timerInterval = null;
let lastTime = 0;
let battleActive = false;

function resizeCanvas() {
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width;
  canvas.height = rect.height - 70;
  W = canvas.width;
  H = canvas.height;
  midY = H * 0.48;
}
window.addEventListener('resize', function() {
  if (gameState === 'battle') resizeCanvas();
});

function startBattle() {
  showScreen('battle-screen');
  resizeCanvas();

  player = {
    x: W / 2, y: H - 100,
    char: playerChar,
    eng: playerChar.Eng,
    maxEng: playerChar.Eng,
    spd: playerChar.spd,
    type: playerChar.type,
    bomb: playerChar.bomb,
    hitTimer: 0,
    fireCD: 0,
    bombUsed: false,
    status: {}
  };
  enemy = {
    x: W / 2, y: 100,
    char: enemyChar,
    eng: enemyChar.Eng,
    maxEng: enemyChar.Eng,
    spd: enemyChar.spd,
    type: enemyChar.type,
    bomb: enemyChar.bomb,
    hitTimer: 0,
    fireCD: 1.5,
    bombUsed: false,
    status: {},
    aiTimer: 0,
    aiDir: 1
  };

  bullets = [];
  effects = [];
  timer = 100;
  battleActive = true;

  document.getElementById('player-face').src = playerChar.face_n;
  document.getElementById('enemy-face').src = enemyChar.face_n;
  updateHPBars();
  document.getElementById('timer').textContent = timer;

  clearInterval(timerInterval);
  timerInterval = setInterval(function() {
    if (!battleActive) return;
    timer--;
    document.getElementById('timer').textContent = timer;
    if (timer <= 0) endBattleByTime();
  }, 1000);

  lastTime = performance.now();
  requestAnimationFrame(battleLoop);

  window.onkeydown = function(e) {
    keys[e.key] = true;
    if (e.key === 'q' || e.key === 'Q') useBomb(player);
  };
  window.onkeyup = function(e) { keys[e.key] = false; };
}

function updateHPBars() {
  document.getElementById('player-hp-bar').style.width = Math.max(0, player.eng / player.maxEng * 100) + '%';
  document.getElementById('enemy-hp-bar').style.width = Math.max(0, enemy.eng / enemy.maxEng * 100) + '%';
}

function battleLoop(now) {
  if (!battleActive) return;
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;
  update(dt);
  draw();
  requestAnimationFrame(battleLoop);
}

function update(dt) {
  let move = 0;
  if (keys['ArrowLeft'] || keys['a'] || keys['A']) move = -1;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) move = 1;
  const pSpeed = (player.spd / 100) * 280 * (player.status.slow ? 0.7 : 1);
  if (!player.status.freeze) {
    player.x += move * pSpeed * dt;
    player.x = Math.max(50, Math.min(W - 50, player.x));
  }

  enemy.aiTimer -= dt;
  if (enemy.aiTimer <= 0) {
    enemy.aiDir = Math.random() > 0.5 ? 1 : -1;
    enemy.aiTimer = 0.6 + Math.random() * 1.2;
  }
  if (Math.abs(enemy.x - player.x) > 50) {
    enemy.aiDir = enemy.x < player.x ? 1 : -1;
  }
  const eSpeed = (enemy.spd / 100) * 220 * (enemy.status.slow ? 0.7 : 1);
  if (!enemy.status.freeze) {
    enemy.x += enemy.aiDir * eSpeed * dt;
    enemy.x = Math.max(50, Math.min(W - 50, enemy.x));
  }

  if (!player.status.freeze) {
    player.fireCD -= dt;
    if (player.fireCD <= 0) {
      firePattern(player, -1);
      player.fireCD = 2.0;
    }
  }
  if (!enemy.status.freeze) {
    enemy.fireCD -= dt;
    if (enemy.fireCD <= 0) {
      firePattern(enemy, 1);
      enemy.fireCD = 2.0;
      if (!enemy.bombUsed && enemy.eng < enemy.maxEng * 0.55 && Math.random() < 0.35) {
        useBomb(enemy);
      }
    }
  }

  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx * dt;
    b.y += b.vy * dt;

    const target = b.owner === 'player' ? enemy : player;
    if (Math.abs(b.y - target.y) < 48 && Math.abs(b.x - target.x) < 45) {
      applyDamage(target, b.dmg);
      bullets.splice(i, 1);
      continue;
    }
    if (b.y < -30 || b.y > H + 30 || b.x < -30 || b.x > W + 30) {
      bullets.splice(i, 1);
    }
  }

  updateStatus(player, dt);
  updateStatus(enemy, dt);

  if (player.hitTimer > 0) {
    player.hitTimer -= dt;
    if (player.hitTimer <= 0) {
      document.getElementById('player-face').src = playerChar.face_n;
    }
  }
  if (enemy.hitTimer > 0) {
    enemy.hitTimer -= dt;
    if (enemy.hitTimer <= 0) {
      document.getElementById('enemy-face').src = enemyChar.face_n;
    }
  }

  if (player.eng <= 0) {
    player.eng = 0;
    endBattle(false);
  } else if (enemy.eng <= 0) {
    enemy.eng = 0;
    endBattle(true);
  }
}

function firePattern(ent, dir) {
  const baseDmg = Math.max(1, Math.floor(ent.char.Pwr / 10));
  const speed = 320 * dir;
  const type = ent.type;

  if (type === 1001) {
    for (let i = 0; i < 5; i++) {
      setTimeout(function() {
        if (!battleActive) return;
        bullets.push({
          x: ent.x, y: ent.y + (dir > 0 ? 40 : -40),
          vx: 0, vy: speed,
          dmg: baseDmg,
          owner: dir < 0 ? 'player' : 'enemy',
          color: dir < 0 ? '#4af' : '#f44'
        });
      }, i * 90);
    }
  } else if (type === 1002) {
    [-1.1, 0, 1.1].forEach(function(ang) {
      bullets.push({
        x: ent.x, y: ent.y + (dir > 0 ? 40 : -40),
        vx: ang * 90,
        vy: speed * 0.95,
        dmg: baseDmg,
        owner: dir < 0 ? 'player' : 'enemy',
        color: dir < 0 ? '#4af' : '#f44'
      });
    });
  } else {
    for (let k = 0; k < 2; k++) {
      setTimeout(function() {
        if (!battleActive) return;
        [-0.6, 0.6].forEach(function(ang) {
          bullets.push({
            x: ent.x, y: ent.y + (dir > 0 ? 40 : -40),
            vx: ang * 70,
            vy: speed,
            dmg: baseDmg,
            owner: dir < 0 ? 'player' : 'enemy',
            color: dir < 0 ? '#4af' : '#f44'
          });
        });
      }, k * 180);
    }
  }
}

function useBomb(ent) {
  if (ent.bombUsed || ent.status.freeze) return;
  ent.bombUsed = true;
  const target = ent === player ? enemy : player;
  const type = ent.bomb;

  if (type === 'fire') {
    target.status.burn = 3.0;
    addEffect(target.x, target.y, '🔥', 1.5);
  } else if (type === 'wind') {
    for (let i = 0; i < 10; i++) {
      setTimeout(function() {
        if (!battleActive) return;
        const dir = ent === player ? -1 : 1;
        bullets.push({
          x: ent.x + (Math.random() - 0.5) * 30,
          y: ent.y + (dir > 0 ? 30 : -30),
          vx: (Math.random() - 0.5) * 40,
          vy: 380 * dir,
          dmg: 1.5,
          owner: ent === player ? 'player' : 'enemy',
          color: '#aaf'
        });
      }, i * 60);
    }
  } else if (type === 'ice') {
    target.status.freeze = 3.0;
    addEffect(target.x, target.y, '❄️', 2.5);
  } else if (type === 'dark') {
    target.status.slow = 5.0;
    target.status.curse = 5.0;
    addEffect(target.x, target.y, '🌑', 2);
  } else if (type === 'light') {
    ent.status.heal = 5.0;
    addEffect(ent.x, ent.y, '✨', 2);
  }
}

function applyDamage(ent, dmg) {
  ent.eng -= dmg;
  if (ent.eng < 0) ent.eng = 0;
  ent.hitTimer = 0.28;
  if (ent === player) {
    document.getElementById('player-face').src = playerChar.face_a;
  } else {
    document.getElementById('enemy-face').src = enemyChar.face_a;
  }
  updateHPBars();
}

function updateStatus(ent, dt) {
  if (ent.status.burn > 0) {
    ent.status.burn -= dt;
    ent.eng = Math.max(0, ent.eng - 5 * dt);
    updateHPBars();
    if (ent.status.burn <= 0) delete ent.status.burn;
  }
  if (ent.status.freeze > 0) {
    ent.status.freeze -= dt;
    if (ent.status.freeze <= 0) delete ent.status.freeze;
  }
  if (ent.status.slow > 0) {
    ent.status.slow -= dt;
    if (ent.status.slow <= 0) delete ent.status.slow;
  }
  if (ent.status.curse > 0) {
    ent.status.curse -= dt;
    ent.eng = Math.max(0, ent.eng - 1 * dt);
    updateHPBars();
    if (ent.status.curse <= 0) delete ent.status.curse;
  }
  if (ent.status.heal > 0) {
    ent.status.heal -= dt;
    ent.eng = Math.min(ent.maxEng, ent.eng + 3 * dt);
    updateHPBars();
    if (ent.status.heal <= 0) delete ent.status.heal;
  }
}

function addEffect(x, y, emoji, life) {
  effects.push({ x: x, y: y, emoji: emoji, life: life, max: life });
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  ctx.strokeStyle = 'rgba(255,50,50,0.25)';
  ctx.setLineDash([10, 8]);
  ctx.beginPath();
  ctx.moveTo(0, midY);
  ctx.lineTo(W, midY);
  ctx.stroke();
  ctx.setLineDash([]);

  ctx.fillStyle = 'rgba(255,100,100,0.12)';
  ctx.font = '14px sans-serif';
  ctx.fillText('상대방 진영', 20, 28);
  ctx.fillStyle = 'rgba(100,150,255,0.12)';
  ctx.fillText('나의 진영', 20, H - 18);

  drawEntity(player);
  drawEntity(enemy);

  bullets.forEach(function(b) {
    ctx.beginPath();
    ctx.fillStyle = b.color;
    ctx.arc(b.x, b.y, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.fillStyle = '#fff';
    ctx.arc(b.x, b.y, 2.5, 0, Math.PI * 2);
    ctx.fill();
  });

  for (let i = effects.length - 1; i >= 0; i--) {
    const e = effects[i];
    e.life -= 0.016;
    if (e.life <= 0) { effects.splice(i, 1); continue; }
    ctx.globalAlpha = e.life / e.max;
    ctx.font = '28px serif';
    ctx.fillText(e.emoji, e.x - 14, e.y - 50);
    ctx.globalAlpha = 1;
  }

  if (player.status.freeze) {
    ctx.fillStyle = 'rgba(100,200,255,0.22)';
    ctx.beginPath();
    ctx.arc(player.x, player.y, 55, 0, Math.PI * 2);
    ctx.fill();
  }
  if (enemy.status.freeze) {
    ctx.fillStyle = 'rgba(100,200,255,0.22)';
    ctx.beginPath();
    ctx.arc(enemy.x, enemy.y, 55, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawEntity(ent) {
  const img = (ent.hitTimer > 0) ? ent.char.img_a : ent.char.img_n;
  const size = 92;

  ctx.save();
  ctx.beginPath();
  ctx.arc(ent.x, ent.y, size / 2, 0, Math.PI * 2);
  ctx.closePath();
  ctx.clip();

  if (img.complete && img.naturalWidth > 0) {
    ctx.drawImage(img, ent.x - size / 2, ent.y - size / 2, size, size);
  } else {
    ctx.fillStyle = ent === player ? '#4af' : '#f44';
    ctx.fillRect(ent.x - size / 2, ent.y - size / 2, size, size);
  }
  ctx.restore();

  ctx.beginPath();
  ctx.strokeStyle = ent === player ? '#4af' : '#f44';
  ctx.lineWidth = 3;
  ctx.arc(ent.x, ent.y, size / 2 + 1, 0, Math.PI * 2);
  ctx.stroke();

  ctx.fillStyle = '#ddd';
  ctx.font = 'bold 13px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(ent.char.name, ent.x, ent.y + size / 2 + 18);
  ctx.textAlign = 'left';
}

function endBattle(playerWin) {
  battleActive = false;
  clearInterval(timerInterval);
  window.onkeydown = null;
  window.onkeyup = null;

  setTimeout(function() {
    if (playerWin) {
      defeated.add(enemyChar.id);

      document.getElementById('vic-player').src = playerChar.face_n;
      document.getElementById('vic-enemy').src = enemyChar.face_a;
      document.getElementById('vic-txt').textContent = playerChar.win_txt;
      showScreen('victory-screen');

      setTimeout(function() {
        const remaining = characters.filter(function(x) {
          return x.id !== playerChar.id && !defeated.has(x.id);
        });
        if (remaining.length === 0) {
          showScreen('gameover-screen');
          setTimeout(function() {
            showScreen('title-screen');
            defeated.clear();
            playerChar = null;
          }, 5000);
        } else {
          enemyChar = remaining[Math.floor(Math.random() * remaining.length)];
          goToVS();
        }
      }, 3000);
    } else {
      document.getElementById('fail-player').src = playerChar.face_a;
      document.getElementById('fail-enemy').src = enemyChar.face_n;
      document.getElementById('fail-txt').textContent = enemyChar.win_txt;
      showScreen('fail-screen');

      setTimeout(function() {
        showScreen('gameover-screen');
        setTimeout(function() {
          showScreen('title-screen');
          defeated.clear();
          playerChar = null;
        }, 5000);
      }, 3000);
    }
  }, 500);
}

function endBattleByTime() {
  if (player.eng >= enemy.eng) endBattle(true);
  else endBattle(false);
}
</script>
