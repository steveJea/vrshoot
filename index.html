<!DOCTYPE html>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

    background: #0a0a0a;
    color: #fff;
    font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
    overflow: hidden;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .screen {
    display: none;
    width: 100%;
    max-width: 960px;
    height: 100vh;
    max-height: 720px;
    position: relative;
    background: #111;
    border: 2px solid #333;
  }
  .screen.active { display: flex; flex-direction: column; }

  /* ===== TITLE ===== */
  #title-screen {
    justify-content: center;
    align-items: center;
    text-align: center;
    background: linear-gradient(180deg, #1a0000 0%, #000 100%);
  }
  #title-screen h1 {
    font-size: 3.2rem;
    letter-spacing: 6px;
    color: #ff2222;
    text-shadow: 0 0 20px #ff0000, 0 0 40px #aa0000;
    margin-bottom: 8px;
  }
  #title-screen .sub {
    font-size: 1.4rem;
    color: #aaa;
    letter-spacing: 4px;
    margin-bottom: 40px;
  }
  #title-screen .game-title {
    font-size: 1.8rem;
    color: #fff;
    margin-bottom: 60px;
  }
  #title-screen .start-msg {
    font-size: 1.1rem;
    color: #ff6666;
    animation: blink 1.2s infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ===== SELECT ===== */
  #select-screen {
    background: #151515;
    padding: 20px;
  }
  #select-screen h2 {
    text-align: center;
    font-size: 1.8rem;
    margin-bottom: 20px;
    color: #ff4444;
    letter-spacing: 3px;
  }
  .char-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 12px;
    flex: 1;
  }
  .char-card {
    background: #222;
    border: 3px solid #444;
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .char-card:hover {
    border-color: #ff4444;
    transform: scale(1.05);
    box-shadow: 0 0 15px rgba(255,50,50,0.6);
  }
  .char-card.selected {
    border-color: #ffcc00;
    box-shadow: 0 0 20px #ffcc00;
    animation: selectPulse 0.6s;
  }
  .char-card img {
    width: 100%;
    height: 140px;
    object-fit: cover;
    display: block;
  }
  .char-card .name {
    text-align: center;
    padding: 6px 0;
    font-size: 0.85rem;
    background: #1a1a1a;
  }
  @keyframes selectPulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.12); }
    100% { transform: scale(1.05); }
  }

  /* ===== VS ===== */
  #vs-screen {
    justify-content: center;
    align-items: center;
    background: #0d0d0d;
  }
  .vs-container {
    display: flex;
    align-items: center;
    gap: 60px;
  }
  .vs-char {
    text-align: center;
  }
  .vs-char img {
    width: 220px;
    height: 280px;
    object-fit: contain;
  }
  .vs-char .name {
    margin-top: 15px;
    font-size: 1.4rem;
    letter-spacing: 2px;
  }
  .vs-text {
    font-size: 3.5rem;
    font-weight: bold;
    color: #ff3333;
    text-shadow: 0 0 30px #ff0000;
  }

  /* ===== BATTLE ===== */
  #battle-screen {
    background: #0a0a12;
    flex-direction: column;
  }
  #battle-ui {
    display: flex;
    justify-content: space-between;
    padding: 10px 20px;
    background: #111;
    border-bottom: 2px solid #333;
    align-items: center;
  }
  .hp-box {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 280px;
  }
  .hp-box img {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 2px solid #555;
    object-fit: cover;
  }
  .hp-bar-wrap {
    flex: 1;
    height: 18px;
    background: #333;
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }
  .hp-bar {
    height: 100%;
    background: linear-gradient(90deg, #ffcc00, #ffaa00);
    transition: width 0.15s;
  }
  .timer {
    font-size: 2.2rem;
    font-weight: bold;
    color: #fff;
    min-width: 80px;
    text-align: center;
    text-shadow: 0 0 10px #ff4444;
  }
  #battle-canvas {
    flex: 1;
    width: 100%;
    background: linear-gradient(180deg, #1a1025 0%, #0a0a15 50%, #151020 100%);
    display: block;
  }
  .battle-info {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.85rem;
    color: #888;
  }

  /* ===== RESULT ===== */
  .result-screen {
    justify-content: center;
    align-items: center;
    background: #0d0d0d;
    text-align: center;
  }
  .result-title {
    font-size: 3rem;
    margin-bottom: 30px;
    letter-spacing: 4px;
  }
  .result-title.win { color: #ffcc00; text-shadow: 0 0 20px #ffaa00; }
  .result-title.lose { color: #ff3333; text-shadow: 0 0 20px #ff0000; }
  .result-faces {
    display: flex;
    gap: 40px;
    margin-bottom: 30px;
    justify-content: center;
  }
  .result-faces img {
    width: 180px;
    height: 180px;
    border-radius: 12px;
    object-fit: cover;
    border: 3px solid #444;
  }
  .win-txt {
    font-size: 1.3rem;
    color: #ddd;
    max-width: 500px;
    line-height: 1.5;
    padding: 15px 25px;
    background: rgba(255,255,255,0.05);
    border-radius: 8px;
  }

  /* ===== GAME OVER ===== */
  #gameover-screen {
    justify-content: center;
    align-items: center;
    background: #000;
  }
  #gameover-screen h1 {
    font-size: 4rem;
    color: #ff2222;
    letter-spacing: 8px;
    text-shadow: 0 0 30px #ff0000;
  }
</style>
</head>

// ===================== STATE =====================
let defeated = new Set();
let playerChar = null;   // 한 번 선택하면 게임오버까지 고정
let enemyChar = null;
let gameState = "title";

// ===================== SCREENS =====================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  gameState = id.replace('-screen','');
}

// Title
document.addEventListener('keydown', e => {
  if (gameState === 'title') {
    showScreen('select-screen');
    renderSelect();
  }
});

// ===================== SELECT (최초 1회만) =====================
function renderSelect() {
  const grid = document.getElementById('char-grid');
  grid.innerHTML = '';
  characters.forEach(c => {
    const card = document.createElement('div');
    card.className = 'char-card';
    card.innerHTML = `<img src="${c.pf_img}" alt="${c.name}"><div class="name">${c.name}</div>`;
    card.onclick = () => selectPlayer(c, card);
    grid.appendChild(card);
  });
}

function selectPlayer(c, card) {
  playerChar = c;          // 여기서 고정
  card.classList.add('selected');

  // 첫 상대 랜덤 선택
  const candidates = characters.filter(x => x.id !== c.id);
  enemyChar = candidates[Math.floor(Math.random() * candidates.length)];

  setTimeout(() => {
    goToVS();
  }, 700);
}
