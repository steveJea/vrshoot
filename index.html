<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none}
body{background:#1a1a1a;color:#fff;font-family:'Segoe UI','Malgun Gothic',sans-serif;overflow:hidden;height:100vh;display:flex;justify-content:center;align-items:center}
.screen{display:none;width:100%;max-width:960px;height:100vh;max-height:720px;position:relative;background:#222;border:2px solid #444;overflow:hidden}
.screen.active{display:flex;flex-direction:column}

#title-screen{justify-content:center;align-items:center;text-align:center;background:url('https://raw.githubusercontent.com/steveJea/vrshoot/main/img/main.jpg') center/cover no-repeat}
#title-screen::before{content:'';position:absolute;inset:0;background:rgba(0,0,0,.55)}
#title-screen>*{position:relative;z-index:1}
#title-screen h1{font-size:3.2rem;letter-spacing:6px;color:#ff2222;text-shadow:0 0 20px #ff0000,0 0 40px #aa0000;margin-bottom:8px}
#title-screen .sub{font-size:1.4rem;color:#ccc;letter-spacing:4px;margin-bottom:40px}
#title-screen .game-title{font-size:1.8rem;color:#fff;margin-bottom:60px}
#title-screen .start-msg{font-size:1.1rem;color:#ff6666;animation:blink 1.2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

#select-screen{background:#2a2a2a;padding:20px;flex-direction:row;gap:16px}
#select-screen h2{position:absolute;top:14px;left:0;width:100%;text-align:center;font-size:1.7rem;color:#ff4444;letter-spacing:3px;z-index:10}
.char-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;flex:1;margin-top:48px;overflow:hidden}
.boss-area{width:160px;margin-top:48px;display:flex;flex-direction:column;gap:10px;overflow-y:auto}
.char-card{background:#333;border:3px solid #555;border-radius:8px;overflow:hidden;cursor:pointer;transition:all .2s;position:relative}
.char-card:hover{border-color:#ff4444;transform:scale(1.04);box-shadow:0 0 12px rgba(255,50,50,.55)}
.char-card.selected{border-color:#ffcc00;box-shadow:0 0 16px #ffcc00}
.char-card.boss-card{border-color:#ff00aa;box-shadow:0 0 10px #ff00aa}
.char-card.boss-card:hover{border-color:#ff66cc;box-shadow:0 0 16px #ff00aa}
.char-card.hidden-card{border-color:#00ccff;box-shadow:0 0 10px #00ccff}
.char-card.hidden-card:hover{border-color:#66eeff;box-shadow:0 0 16px #00ccff}
.char-card img{width:100%;height:120px;object-fit:cover;display:block}
.char-card .name{text-align:center;padding:5px 0;font-size:.8rem;background:#222}
.char-card.boss-card .name{color:#ff66cc;font-weight:bold}
.char-card.hidden-card .name{color:#66eeff;font-weight:bold}

/* Profile Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;justify-content:center;align-items:center;z-index:9999}
.modal-overlay.show{display:flex}
.modal-box{background:#2a2a2a;border:3px solid #ff4444;border-radius:16px;padding:28px 32px;max-width:380px;width:90%;text-align:center;box-shadow:0 0 30px rgba(255,50,50,.4)}
.modal-box img{width:160px;height:160px;object-fit:cover;border-radius:12px;border:3px solid #555;margin-bottom:16px}
.modal-box .m-name{font-size:1.6rem;font-weight:bold;color:#ffcc00;margin-bottom:14px;letter-spacing:2px}
.modal-box .m-stats{text-align:left;background:#1a1a1a;border-radius:10px;padding:14px 18px;margin-bottom:20px;font-size:1rem;line-height:1.8}
.modal-box .m-stats span{color:#aaa}
.modal-box .m-stats b{color:#fff}
.modal-btns{display:flex;gap:12px;justify-content:center}
.modal-btns button{flex:1;padding:12px 0;border:none;border-radius:8px;font-size:1rem;font-weight:bold;cursor:pointer;transition:all .2s}
.btn-confirm{background:#ff4444;color:#fff}
.btn-confirm:hover{background:#ff6666}
.btn-close{background:#555;color:#fff}
.btn-close:hover{background:#777}

#vs-screen{justify-content:center;align-items:center;background:#ffffff}
.vs-container{display:flex;align-items:center;gap:40px}
.vs-char{text-align:center}
.vs-char img{width:220px;height:280px;object-fit:contain}
.vs-char .name{margin-top:12px;font-size:1.3rem;letter-spacing:2px;color:#222}
.vs-text{font-size:3.2rem;font-weight:bold;color:#ff3333;text-shadow:0 0 20px #ff0000}
.boss-vs-img{max-width:80%;max-height:70%;object-fit:contain}
.boss-vs-name{position:absolute;bottom:70px;left:50%;transform:translateX(-50%);font-size:2.2rem;color:#fff;text-shadow:0 0 12px #000,0 0 24px #ff0000;letter-spacing:3px;background:rgba(0,0,0,.55);padding:8px 24px;border-radius:8px}

#battle-screen{background:#d0d0d0;flex-direction:column}
#battle-ui{display:flex;justify-content:space-between;padding:10px 18px;background:#333;border-bottom:2px solid #555;align-items:center;color:#fff}
.hp-box{display:flex;align-items:center;gap:10px;width:270px}
.hp-box img{width:46px;height:46px;border-radius:50%;border:2px solid #888;object-fit:cover}
.hp-bar-wrap{flex:1;height:16px;background:#555;border-radius:4px;overflow:hidden;position:relative}
.hp-bar{height:100%;background:linear-gradient(90deg,#ffcc00,#ff8800);transition:width .15s}
.hp-pct{position:absolute;right:4px;top:0;bottom:0;display:flex;align-items:center;font-size:11px;font-weight:bold;color:#fff;text-shadow:0 0 3px #000}
.timer{font-size:2rem;font-weight:bold;color:#fff;min-width:70px;text-align:center;text-shadow:0 0 8px #ff4444}
#battle-canvas{flex:1;width:100%;display:block;background-size:cover;background-position:center;background-repeat:no-repeat}
.battle-info{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);font-size:.8rem;color:#555}

.result-screen{justify-content:center;align-items:center;background:#ffffff;text-align:center}
.result-title{font-size:2.8rem;margin-bottom:24px;letter-spacing:4px}
.result-title.win{color:#ffcc00;text-shadow:0 0 18px #ffaa00}
.result-title.lose{color:#ff3333;text-shadow:0 0 18px #ff0000}
.result-faces{display:flex;gap:36px;margin-bottom:24px;justify-content:center}
.result-faces img{width:160px;height:160px;border-radius:10px;object-fit:cover;border:3px solid #555}
.win-txt{font-size:1.2rem;color:#333;max-width:480px;line-height:1.5;padding:14px 22px;background:rgba(0,0,0,.06);border-radius:8px}

#gameover-screen,#ending-screen{justify-content:center;align-items:center;background:#000;background-size:cover;background-position:center}
#gameover-screen h1{font-size:3.6rem;color:#ff2222;letter-spacing:8px;text-shadow:0 0 28px #ff0000;position:relative;z-index:2}
#ending-screen{flex-direction:column;padding:36px}
#ending-img{max-width:90%;max-height:52%;object-fit:contain;margin-bottom:18px;border-radius:8px}
#ending-txt{font-size:1.1rem;line-height:1.65;color:#eee;max-width:680px;text-align:left;background:rgba(0,0,0,.7);padding:18px 22px;border-radius:10px;min-height:110px;white-space:pre-wrap}
#ending-hint{margin-top:16px;color:#aaa;font-size:.9rem}

.shake{animation:shake .4s}
@keyframes shake{0%,100%{transform:translate(0,0)}10%,30%,50%,70%,90%{transform:translate(-6px,3px)}20%,40%,60%,80%{transform:translate(6px,-3px)}}
</style>

<div id="title-screen" class="screen active">

  <div class="sub">THE BRUTAL CITY</div>
  <div class="game-title">SHOOTING MASTERS</div>
  <div class="start-msg">Press Any Key to START</div>
</div>

<div id="select-screen" class="screen">
  <h2>Select Your Fighter</h2>
  <div class="char-grid" id="char-grid"></div>
  <div class="boss-area" id="boss-area"></div>
</div>

<!-- Profile Modal -->
<div class="modal-overlay" id="profile-modal">
  <div class="modal-box">
    <img id="modal-img" src="" alt="">
    <div class="m-name" id="modal-name"></div>
    <div class="m-stats">
      <div><span>Pwr</span> : <b id="modal-pwr"></b></div>
      <div><span>Eng</span> : <b id="modal-eng"></b></div>
      <div><span>Spd</span> : <b id="modal-spd"></b></div>
      <div><span>Bomb</span> : <b id="modal-bomb"></b></div>
    </div>
    <div class="modal-btns">
      <button class="btn-confirm" id="modal-confirm">CONFIRM</button>
      <button class="btn-close" id="modal-close">CLOSE</button>
    </div>
  </div>
</div>

<div id="vs-screen" class="screen">
  <div class="vs-container" id="vs-normal">
    <div class="vs-char"><img id="vs-player-img" src="" alt=""><div class="name" id="vs-player-name"></div></div>
    <div class="vs-text">VS</div>
    <div class="vs-char"><img id="vs-enemy-img" src="" alt=""><div class="name" id="vs-enemy-name"></div></div>
  </div>
  <div id="vs-boss" style="display:none;width:100%;height:100%;justify-content:center;align-items:center;position:relative">
    <img id="vs-boss-img" class="boss-vs-img" src="" alt="">
    <div class="boss-vs-name" id="vs-boss-name"></div>
  </div>
</div>

<div id="battle-screen" class="screen">
  <div id="battle-ui">
    <div class="hp-box">
      <img id="player-face" src="" alt="">

        <div class="hp-bar" id="player-hp-bar"></div>
        <div class="hp-pct" id="player-hp-pct">100.0%</div>
      </div>
    </div>
    <div class="timer" id="timer">30</div>
    <div class="hp-box" style="flex-direction:row-reverse">
      <img id="enemy-face" src="" alt="">
      <div class="hp-bar-wrap">
        <div class="hp-bar" id="enemy-hp-bar"></div>

    </div>
  </div>
  <canvas id="battle-canvas"></canvas>

</div>

<div id="victory-screen" class="screen result-screen">

  <div class="win-txt" id="vic-txt"></div>
</div>

<div id="fail-screen" class="screen result-screen">
  <div class="result-title lose">YOU LOSE</div>
  <div class="result-faces"><img id="fail-player" src="" alt=""><img id="fail-enemy" src="" alt=""></div>
  <div class="win-txt" id="fail-txt"></div>
</div>

<div id="ending-screen" class="screen">

</div>

let defeated=new Set(),playerChar=null,enemyChar=null,bossIndex=0,isBossFight=false,gameState="title",endingPhase=0;

function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');gameState=id.replace('-screen','')}

const canvas=document.getElementById('battle-canvas'),ctx=canvas.getContext('2d');
let W,H,midY,player,enemy,bullets=[],effects=[],particles=[],keys={},timer=30,timerInterval=null,lastTime=0,battleActive=false,shakeTime=0;

function resizeCanvas(){const rect=canvas.parentElement.getBoundingClientRect();canvas.width=rect.width;canvas.height=rect.height-70;W=canvas.width;H=canvas.height;midY=H*.48}
window.addEventListener('resize',()=>{if(gameState==='battle')resizeCanvas()});

function startBattle(){
  showScreen('battle-screen');resizeCanvas();

  const bg = enemyChar.bg_img || '';
  if(bg){
    canvas.style.backgroundImage = `url('${bg}')`;
    canvas.style.backgroundSize = 'cover';
    canvas.style.backgroundPosition = 'center';
  } else {
    canvas.style.backgroundImage = 'none';
  }

  const pEng=playerChar.Eng, eEng=enemyChar.Eng;
  player={x:W/2,y:H-110,char:playerChar,eng:pEng,maxEng:pEng,spd:playerChar.spd,type:playerChar.type,bomb:playerChar.bomb,hitTimer:0,fireCD:0,bombUsed:false,status:{},specialFlash:0,speedMul:1};
  enemy={x:W/2,y:110,char:enemyChar,eng:eEng,maxEng:eEng,spd:enemyChar.spd,type:enemyChar.type,bomb:enemyChar.bomb,hitTimer:0,fireCD:1.5,bombUsed:false,status:{},specialFlash:0,aiTimer:0,aiDirX:1,aiDirY:0,speedMul:1};
  bullets=[];effects=[];particles=[];timer=30;battleActive=true;shakeTime=0;
  document.getElementById('player-face').src=playerChar.face_n;document.getElementById('enemy-face').src=enemyChar.face_n;
  updateHPBars();document.getElementById('timer').textContent=timer;

  timerInterval=setInterval(()=>{if(!battleActive)return;timer--;document.getElementById('timer').textContent=timer;if(timer<=0)endBattleByTime()},1000);
  lastTime=performance.now();requestAnimationFrame(battleLoop);
  window.onkeydown=e=>{
    keys[e.key]=true;
    if(e.key===' '||e.key==='Spacebar'){
      e.preventDefault();

    }
    if((e.key==='q'||e.key==='Q')&&!player.bombUsed)useBomb(player);
  };
  window.onkeyup=e=>{keys[e.key]=false};
}

function updateHPBars(){
  const pPct=Math.max(0,player.eng/player.maxEng*100);
  const ePct=Math.max(0,enemy.eng/enemy.maxEng*100);
  document.getElementById('player-hp-bar').style.width=pPct+'%';
  document.getElementById('enemy-hp-bar').style.width=ePct+'%';
  document.getElementById('player-hp-pct').textContent=pPct.toFixed(1)+'%';
  document.getElementById('enemy-hp-pct').textContent=ePct.toFixed(1)+'%';
}

function battleLoop(now){if(!battleActive)return;const dt=Math.min((now-lastTime)/1000,.05);lastTime=now;update(dt);draw();requestAnimationFrame(battleLoop)}

function update(dt){
  let mx=0,my=0;
  if(keys['ArrowLeft']||keys['a']||keys['A'])mx=-1;if(keys['ArrowRight']||keys['d']||keys['D'])mx=1;
  if(keys['ArrowUp']||keys['w']||keys['W'])my=-1;if(keys['ArrowDown']||keys['s']||keys['S'])my=1;
  const pSpeed=(player.spd/100)*260*(player.speedMul||1)*(player.status.slow?0.2:1);
  if(!player.status.freeze){player.x+=mx*pSpeed*dt;player.y+=my*pSpeed*dt;player.x=Math.max(50,Math.min(W-50,player.x));player.y=Math.max(midY+40,Math.min(H-60,player.y))}

  enemy.aiTimer-=dt;let dodgeX=0,dodgeY=0;
  for(const b of bullets){if(b.owner!=='player')continue;const dx=b.x-enemy.x,dy=b.y-enemy.y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<180&&Math.abs(dx)<70){dodgeX+=dx>0?-1:1;dodgeY+=dy>0?-0.6:0.4}}
  if(Math.abs(dodgeX)+Math.abs(dodgeY)>.3){enemy.aiDirX=dodgeX;enemy.aiDirY=dodgeY;enemy.aiTimer=.35}
  else if(enemy.aiTimer<=0){enemy.aiDirX=(Math.random()-.5)*2;enemy.aiDirY=(Math.random()-.5)*1.2;enemy.aiTimer=.5+Math.random()*.9}
  const eSpeed=(enemy.spd/100)*230*(enemy.speedMul||1)*(enemy.status.slow?0.2:1);
  if(!enemy.status.freeze){const len=Math.sqrt(enemy.aiDirX*enemy.aiDirX+enemy.aiDirY*enemy.aiDirY)||1;enemy.x+=(enemy.aiDirX/len)*eSpeed*dt;enemy.y+=(enemy.aiDirY/len)*eSpeed*dt;enemy.x=Math.max(50,Math.min(W-50,enemy.x));enemy.y=Math.max(60,Math.min(midY-40,enemy.y))}

  if(player.fireCD>0)player.fireCD-=dt;
  if(enemy.fireCD>0)enemy.fireCD-=dt;
  if(!enemy.status.freeze&&enemy.fireCD<=0){firePattern(enemy,1);enemy.fireCD=2.0;if(!enemy.bombUsed&&enemy.eng<enemy.maxEng*.5&&Math.random()<.35)useBomb(enemy)}

  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    if(b.homing){
      const target = b.owner==='player' ? enemy : player;
      const dx = target.x - b.x, dy = target.y - b.y;
      const dist = Math.sqrt(dx*dx+dy*dy)||1;
      const speed = b.speed || 380;
      b.vx = (dx/dist)*speed;
      b.vy = (dy/dist)*speed;
    }
    b.x+=b.vx*dt;b.y+=b.vy*dt;
    const target=b.owner==='player'?enemy:player;
    if(Math.abs(b.y-target.y)<50&&Math.abs(b.x-target.x)<48){
      applyDamage(target,b.dmg);
      if(b.onHit) b.onHit(target);
      spawnExplosion(b.x,b.y,b.owner==='player'?'#4af':'#f44');
      bullets.splice(i,1);
      continue;
    }
    if(b.y<-40||b.y>H+40||b.x<-40||b.x>W+40)bullets.splice(i,1);
  }

  updateStatus(player,dt);updateStatus(enemy,dt);
  if(player.hitTimer>0){player.hitTimer-=dt;if(player.hitTimer<=0)document.getElementById('player-face').src=playerChar.face_n}
  if(enemy.hitTimer>0){enemy.hitTimer-=dt;if(enemy.hitTimer<=0)document.getElementById('enemy-face').src=enemyChar.face_n}
  if(player.specialFlash>0)player.specialFlash-=dt;if(enemy.specialFlash>0)enemy.specialFlash-=dt;if(shakeTime>0)shakeTime-=dt;
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;if(p.life<=0)particles.splice(i,1)}
  if(player.eng<=0){player.eng=0;endBattle(false)}else if(enemy.eng<=0){enemy.eng=0;endBattle(true)}
}

function firePattern(ent,dir){
  const baseDmg=Math.max(1,Math.floor(ent.char.Pwr/10));
  const speed=340*dir,type=ent.type;
  if(type===1001){for(let i=0;i<5;i++)setTimeout(()=>{if(!battleActive)return;bullets.push({x:ent.x,y:ent.y+(dir>0?45:-45),vx:0,vy:speed,dmg:baseDmg,owner:dir<0?'player':'enemy',color:dir<0?'#4af':'#f44'})},i*85)}
  else if(type===1002){[-1.2,0,1.2].forEach(ang=>bullets.push({x:ent.x,y:ent.y+(dir>0?45:-45),vx:ang*95,vy:speed*.95,dmg:baseDmg,owner:dir<0?'player':'enemy',color:dir<0?'#4af':'#f44'}))}
  else if(type===1003){for(let k=0;k<2;k++)setTimeout(()=>{if(!battleActive)return;[-.7,.7].forEach(ang=>bullets.push({x:ent.x,y:ent.y+(dir>0?45:-45),vx:ang*75,vy:speed,dmg:baseDmg,owner:dir<0?'player':'enemy',color:dir<0?'#4af':'#f44'}))},k*170)}
  else if(type===1004){for(let i=0;i<5;i++)setTimeout(()=>{if(!battleActive)return;[-.9,0,.9].forEach(ang=>bullets.push({x:ent.x,y:ent.y+(dir>0?45:-45),vx:ang*80,vy:speed,dmg:baseDmg,owner:dir<0?'player':'enemy',color:dir<0?'#4af':'#f44'}))},i*100)}
  else if(type===1005){for(let i=0;i<5;i++)setTimeout(()=>{if(!battleActive)return;[-1.4,-.7,0,.7,1.4].forEach(ang=>bullets.push({x:ent.x,y:ent.y+(dir>0?45:-45),vx:ang*70,vy:speed*.92,dmg:baseDmg,owner:dir<0?'player':'enemy',color:dir<0?'#4af':'#f44'}))},i*110)}
}

function useBomb(ent){
  if(ent.bombUsed||ent.status.freeze)return;
  ent.bombUsed=true;
  ent.specialFlash=1.2;
  const target = ent===player ? enemy : player;
  const type = ent.bomb;
  const isPlayer = ent===player;

  if(type==='dark'){
    target.status.dark = 3;
    target.status.darkDmg = target.maxEng * 0.05;
    target.speedMul = 0.8;
    addEffect(target.x, target.y, '🌑', 2.5);
  }
  else if(type==='fire'){
    for(let i=0;i<3;i++){
      setTimeout(()=>{
        if(!battleActive)return;
        bullets.push({
          x:ent.x, y:ent.y+(isPlayer?-40:40),
          vx:0, vy:isPlayer?-300:300,
          dmg:50, owner:isPlayer?'player':'enemy',
          color:'#ff6600', homing:true, speed:420,
          onHit:(t)=>{
            t.status.burn = 2;
            t.status.burnDmg = t.maxEng * 0.01;
          }
        });
      }, i*120);
    }
    addEffect(ent.x, ent.y, '🔥', 1.5);
  }
  else if(type==='ice'){
    target.status.freeze = 3;
    target.status.iceDmg = target.maxEng * 0.01;
    addEffect(target.x, target.y, '❄️', 2.8);
  }
  else if(type==='wind'){
    for(let i=0;i<10;i++){
      setTimeout(()=>{
        if(!battleActive)return;
        bullets.push({
          x:ent.x+(Math.random()-0.5)*30, y:ent.y+(isPlayer?-35:35),
          vx:(Math.random()-0.5)*40, vy:isPlayer?-280:280,
          dmg:15, owner:isPlayer?'player':'enemy',
          color:'#88ccff', homing:true, speed:400,
          onHit:(t)=>{
            t.status.windSlow = (t.status.windSlow||0) + 0.3;
            t.speedMul = 0.2;
          }
        });
      }, i*55);
    }
    addEffect(ent.x, ent.y, '💨', 1.8);
  }
  else if(type==='light'){
    ent.status.heal = 5;
    ent.status.healPct = 0.02;
    ent.speedMul = 1.2;
    addEffect(ent.x, ent.y, '✨', 2.5);
  }
  else if(type==='demon'){
    target.status.demon = 5;
    target.status.demonDmg = target.maxEng * 0.04;
    target.speedMul = 0.6;
    addEffect(target.x, target.y, '😈', 2.8);
  }
  else if(type==='abyss'){
    const dmg = target.maxEng * 0.40;
    target.eng = Math.max(0, target.eng - dmg);
    updateHPBars();
    target.status.freeze = 3;
    spawnBlackExplosion(target.x, target.y);
    addEffect(target.x, target.y, '💀', 2.5);
  }
}

function applyDamage(ent,dmg){
  ent.eng-=dmg;if(ent.eng<0)ent.eng=0;ent.hitTimer=.28;
  if(ent===player){document.getElementById('player-face').src=playerChar.face_a;shakeTime=.4;document.getElementById('battle-screen').classList.add('shake');setTimeout(()=>document.getElementById('battle-screen').classList.remove('shake'),400)}
  else document.getElementById('enemy-face').src=enemyChar.face_a;
  updateHPBars();
}

function updateStatus(ent,dt){
  if(ent.status.dark>0){
    ent.status.dark-=dt;
    ent.eng=Math.max(0,ent.eng-ent.status.darkDmg*dt);
    updateHPBars();
    if(ent.status.dark<=0){delete ent.status.dark;delete ent.status.darkDmg;ent.speedMul=1}
  }
  if(ent.status.burn>0){
    ent.status.burn-=dt;
    ent.eng=Math.max(0,ent.eng-(ent.status.burnDmg||0)*dt);
    updateHPBars();
    if(ent.status.burn<=0){delete ent.status.burn;delete ent.status.burnDmg}
  }
  if(ent.status.iceDmg && ent.status.freeze>0){
    ent.eng=Math.max(0,ent.eng-ent.status.iceDmg*dt);
    updateHPBars();
  }
  if(ent.status.freeze>0){
    ent.status.freeze-=dt;
    if(ent.status.freeze<=0){delete ent.status.freeze;delete ent.status.iceDmg}
  }
  if(ent.status.windSlow>0){
    ent.status.windSlow-=dt;
    if(ent.status.windSlow<=0){delete ent.status.windSlow;ent.speedMul=1}
  }
  if(ent.status.heal>0){
    ent.status.heal-=dt;
    ent.eng=Math.min(ent.maxEng,ent.eng+(ent.status.healPct||0.02)*ent.maxEng*dt);
    updateHPBars();
    if(ent.status.heal<=0){delete ent.status.heal;delete ent.status.healPct;ent.speedMul=1}
  }
  if(ent.status.demon>0){
    ent.status.demon-=dt;
    ent.eng=Math.max(0,ent.eng-ent.status.demonDmg*dt);
    updateHPBars();
    if(ent.status.demon<=0){delete ent.status.demon;delete ent.status.demonDmg;ent.speedMul=1}
  }
  if(ent.status.slow>0){ent.status.slow-=dt;if(ent.status.slow<=0)delete ent.status.slow}
}

function addEffect(x,y,emoji,life){effects.push({x,y,emoji,life,max:life})}
function spawnExplosion(x,y,color){for(let i=0;i<12;i++){const a=Math.random()*Math.PI*2,s=80+Math.random()*120;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:.35+Math.random()*.25,color,size:3+Math.random()*4})}}
function spawnBlackExplosion(x,y){for(let i=0;i<25;i++){const a=Math.random()*Math.PI*2,s=100+Math.random()*180;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:.5+Math.random()*.4,color:'#111',size:5+Math.random()*7})}}

function draw(){
  ctx.clearRect(0,0,W,H);
  let ox=0,oy=0;if(shakeTime>0){ox=(Math.random()-.5)*10;oy=(Math.random()-.5)*8}
  ctx.save();ctx.translate(ox,oy);
  ctx.strokeStyle='rgba(180,50,50,.35)';ctx.setLineDash([10,8]);ctx.beginPath();ctx.moveTo(0,midY);ctx.lineTo(W,midY);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='rgba(150,50,50,.15)';ctx.font='14px sans-serif';ctx.fillText('상대방 진영',20,28);ctx.fillStyle='rgba(50,80,150,.15)';ctx.fillText('나의 진영',20,H-18);
  drawEntity(player);drawEntity(enemy);
  bullets.forEach(b=>{
    ctx.beginPath();
    ctx.fillStyle=b.color;
    const r = b.homing ? 8 : 6;
    ctx.arc(b.x,b.y,r,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.fillStyle='#fff';ctx.arc(b.x,b.y,r*0.4,0,Math.PI*2);ctx.fill();
  });
  particles.forEach(p=>{ctx.globalAlpha=Math.max(0,p.life*2);ctx.beginPath();ctx.fillStyle=p.color;ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill()});ctx.globalAlpha=1;
  effects.forEach((e,i)=>{e.life-=.016;if(e.life<=0){effects.splice(i,1);return}ctx.globalAlpha=e.life/e.max;ctx.font='32px serif';ctx.fillText(e.emoji,e.x-16,e.y-55)});ctx.globalAlpha=1;
  [player,enemy].forEach(ent=>{if(ent.specialFlash>0){ctx.beginPath();ctx.strokeStyle=`rgba(255,255,100,${ent.specialFlash})`;ctx.lineWidth=6;ctx.arc(ent.x,ent.y,60+(1-ent.specialFlash)*30,0,Math.PI*2);ctx.stroke();ctx.fillStyle=`rgba(255,200,50,${ent.specialFlash*.25})`;ctx.beginPath();ctx.arc(ent.x,ent.y,55,0,Math.PI*2);ctx.fill()}});
  if(player.status.freeze){ctx.fillStyle='rgba(100,200,255,.25)';ctx.beginPath();ctx.arc(player.x,player.y,55,0,Math.PI*2);ctx.fill()}
  if(enemy.status.freeze){ctx.fillStyle='rgba(100,200,255,.25)';ctx.beginPath();ctx.arc(enemy.x,enemy.y,55,0,Math.PI*2);ctx.fill()}
  ctx.restore();
}

function drawEntity(ent){
  const img=ent.hitTimer>0?ent.char.img_a:ent.char.img_n,size=92;
  ctx.save();ctx.beginPath();ctx.arc(ent.x,ent.y,size/2,0,Math.PI*2);ctx.closePath();ctx.clip();
  if(img.complete&&img.naturalWidth>0)ctx.drawImage(img,ent.x-size/2,ent.y-size/2,size,size);
  else{ctx.fillStyle=ent===player?'#4af':'#f44';ctx.fillRect(ent.x-size/2,ent.y-size/2,size,size)}
  ctx.restore();
  ctx.beginPath();ctx.strokeStyle=ent===player?'#4af':'#f44';ctx.lineWidth=3;ctx.arc(ent.x,ent.y,size/2+1,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle='#222';ctx.font='bold 13px sans-serif';ctx.textAlign='center';ctx.fillText(ent.char.name,ent.x,ent.y+size/2+18);ctx.textAlign='left';
}

function endBattle(playerWin){
  battleActive=false;clearInterval(timerInterval);window.onkeydown=null;window.onkeyup=null;
  setTimeout(()=>{
    if(playerWin){
      if(!isBossFight) defeated.add(enemyChar.id);

      document.getElementById('vic-player').src=playerChar.face_n;
      document.getElementById('vic-enemy').src=enemyChar.face_a;
      document.getElementById('vic-txt').textContent=playerChar.win_txt;
      showScreen('victory-screen');

      setTimeout(()=>{
        if(!isBossFight){
          // 일반 캐릭터와 싸운 횟수가 5회 미만이면 다음 랜덤 상대
          if(defeated.size < MAX_NORMAL_FIGHTS){
            const remaining = characters.filter(x => x.id !== playerChar.id && !defeated.has(x.id));
            if(remaining.length === 0){
              // 남은 일반 캐릭터가 없으면 보스로
              bossIndex=0; isBossFight=true; enemyChar=bosses[0]; goToVS();
            } else {
              enemyChar = remaining[Math.floor(Math.random()*remaining.length)];
              goToVS();
            }
          } else {
            // 5명 이겼으면 보스로 이동
            bossIndex=0; isBossFight=true; enemyChar=bosses[0]; goToVS();
          }
        } else {
          bossIndex++;
          if(bossIndex >= bosses.length) startEnding();
          else { enemyChar=bosses[bossIndex]; goToVS(); }
        }
      },2800);
    } else {
      document.getElementById('fail-player').src=playerChar.face_a;
      document.getElementById('fail-enemy').src=enemyChar.face_n;
      document.getElementById('fail-txt').textContent=enemyChar.win_txt;
      showScreen('fail-screen');
      setTimeout(()=>{
        const go=document.getElementById('gameover-screen');
        go.style.backgroundImage=`url('${playerChar.lose_img}')`;
        go.style.backgroundSize='cover';go.style.backgroundPosition='center';
        showScreen('gameover-screen');
        setTimeout(()=>{
          showScreen('title-screen');
          defeated.clear();
          playerChar=null;
          bossIndex=0;
          isBossFight=false;
          document.getElementById('gameover-screen').style.backgroundImage='';
        },5000);
      },2800);
    }
  },500);
}

function endBattleByTime(){
  const pRatio=player.eng/player.maxEng;
  const eRatio=enemy.eng/enemy.maxEng;
  if(pRatio>=eRatio)endBattle(true);else endBattle(false);
}

let typingTimer=null,fullFtxt='',typedLen=0;
function startEnding() {
  endingPhase = 0;
  fullFtxt = playerChar.f_txt || "Victory... The true ending begins.";
  typedLen = 0;

  const media = playerChar.win_mp4 || playerChar.win_img;
  const isVideo = media && media.endsWith('.mp4');
  const old = document.getElementById('ending-img');

  if (isVideo) {
    old.outerHTML = `<video id="ending-img" autoplay muted loop playsinline style="max-width:90%;max-height:52%;border-radius:8px;margin-bottom:18px;object-fit:contain"><source src="${media}" type="video/mp4"></video>`;
  } else {
    old.outerHTML = `<img id="ending-img" src="${media}" style="max-width:90%;max-height:52%;object-fit:contain;margin-bottom:18px;border-radius:8px">`;
  }

  document.getElementById('ending-txt').textContent = '';
  document.getElementById('ending-hint').textContent = '클릭하면 전체 텍스트가 표시됩니다';
  showScreen('ending-screen');

  typingTimer = setInterval(() => {
    if (typedLen < fullFtxt.length) {
      typedLen++;
      document.getElementById('ending-txt').textContent = fullFtxt.substring(0, typedLen);
    } else {
      clearInterval(typingTimer);
      document.getElementById('ending-hint').textContent = '다시 클릭하면 GAME OVER';
      endingPhase = 1;
    }
  }, 28);

  setTimeout(() => {
    if (gameState === 'ending') {
      clearInterval(typingTimer);
      const go = document.getElementById('gameover-screen');
      go.style.backgroundImage = `url('${playerChar.win_img}')`;
      go.style.backgroundSize = 'cover';
      go.style.backgroundPosition = 'center';
      showScreen('gameover-screen');
      endingPhase = 2;

      setTimeout(() => {
        showScreen('title-screen');
        defeated.clear();
        playerChar = null;
        bossIndex = 0;
        isBossFight = false;
        document.getElementById('gameover-screen').style.backgroundImage = '';
      }, 6000);
    }
  }, 10000);
}

document.getElementById('ending-screen').addEventListener('click',()=>{
  if(gameState!=='ending')return;
  if(endingPhase===0){clearInterval(typingTimer);document.getElementById('ending-txt').textContent=fullFtxt;document.getElementById('ending-hint').textContent='다시 클릭하면 GAME OVER';endingPhase=1}
  else if(endingPhase===1){
    const go=document.getElementById('gameover-screen');
    go.style.backgroundImage=`url('${playerChar.win_img}')`;
    go.style.backgroundSize='cover';go.style.backgroundPosition='center';
    showScreen('gameover-screen');endingPhase=2;
    setTimeout(()=>{showScreen('title-screen');defeated.clear();playerChar=null;bossIndex=0;isBossFight=false;document.getElementById('gameover-screen').style.backgroundImage=''},6000);
  }
});
